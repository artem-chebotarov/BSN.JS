<!DOCTYPE HTML>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSN — Demo Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #0d1117;
            /* Глубокий темный фон в стиле GitHub */
        }

        #text {
            font-family: 'Courier New', Courier, monospace;
            resize: none;
            border-color: #30363d;
        }

        .btn-custom {
            min-width: 100px;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-4 text-light">Bootstrap Service Notification</h1>
                <p class="text-secondary mb-5">Interactive testing laboratory for BSN plugin</p>

                <div class="card bg-dark border-secondary shadow-lg mb-4">
                    <div class="card-body d-flex flex-wrap justify-content-center gap-3">
                        <button id="html" class="btn btn-outline-secondary btn-custom">HTML</button>
                        <button id="confirm" class="btn btn-info btn-custom text-white">Confirm</button>
                        <button id="prompt" class="btn btn-success btn-custom">Prompt</button>
                        <button id="alert" class="btn btn-warning btn-custom">Alert</button>
                        <button id="toast" class="btn btn-primary btn-custom">Toast</button>
                    </div>
                </div>

                <div class="position-relative">
                    <label for="text" class="form-label text-secondary small">DOM Inspector Output:</label>
                    <textarea id="text" class="form-control bg-black text-success" rows="12" readonly
                        placeholder="Click 'HTML' to see the page structure..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script src="./src/bsn.js"></script>
    <script src="./demo/script.js"></script>

</body>

</html>
